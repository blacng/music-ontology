# Docker services for the music ontology's reasoning + SPARQL-serving layer.
#
# Wired to make targets (see Makefile):
#   make reason       -> one-shot HermiT reasoner (obolibrary/robot)   [service: reasoner]
#   make serve        -> start the Fuseki SPARQL server                [service: fuseki]
#   make fuseki-load  -> build dist/ dataset + load it into Fuseki
#   make down         -> stop the Fuseki server
#
# The reasoner is a batch tool, not a server, so it sits behind the "tools" profile
# and never starts on `docker compose up`; run it explicitly via `docker compose run`.

services:
  # --- One-shot HermiT reasoner via ROBOT (consistency + entailment check) ---
  reasoner:
    image: obolibrary/robot
    profiles: ["tools"]          # excluded from `up`; started only by `compose run`
    working_dir: /work
    volumes:
      - .:/work                  # rw: writes .robot_reasoned.ttl, cleaned by make
    entrypoint: ["robot"]
    command:
      - merge
      - --catalog
      - ontology/catalog-v001.xml
      - --input
      - ontology/music_vocabulary_comprehensive.ttl
      - --input
      - ontology/music_catalog_data.ttl
      - reason
      - --reasoner
      - hermit
      - --output
      - /work/.robot_reasoned.ttl

  # --- Long-running Apache Jena Fuseki SPARQL server ---
  # Serves a persistent (TDB) dataset named `music`, created empty on first run;
  # `make fuseki-load` populates its four named graphs from dist/music_dataset.trig.
  fuseki:
    image: stain/jena-fuseki:5.0.0
    platform: linux/amd64        # image is amd64-only; runs under emulation on arm64 Macs
    ports:
      - "3030:3030"              # UI + endpoints at http://localhost:3030
    environment:
      ADMIN_PASSWORD: ${FUSEKI_ADMIN_PASSWORD:-admin}
      FUSEKI_DATASET_1: music    # auto-create dataset `music` on first boot
    volumes:
      - fuseki-data:/fuseki      # TDB databases + config persist across restarts
      - ./dist:/staging:ro       # dataset available in-container for offline load.sh

volumes:
  fuseki-data:
